# config/env/prod.yaml
# ここには「環境差分」だけを書く
# base.yaml にある共通設定はなるべく重複して書かない

output_directory: "tmp"

paths:
  thresholds_file: "/work/config/thresholds.yaml"
  evaluation_data_dir: "/work/tmp"
  output_data_dir: "/work/output"

base_directory: "/work/input"
picture_root: "/work/input"

quality_thresholds_path: "/work/config/quality_thresholds.yaml"
evaluator_thresholds_path: "/work/config/evaluator_thresholds.yaml"

debug:
  run_results_dir: "/work/runs"
  log_summary_detail: true
  persist_run_results: true

portrait_quality:
  insightface:
    strict: true
    model_root: "/work/models/insightface"
    providers:
      - "CPUExecutionProvider"
    det_size:
      - 640
      - 640