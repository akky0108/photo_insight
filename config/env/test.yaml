# config/config.test.yaml

output_directory: "temp"

paths:
  thresholds_file: "./config/thresholds.yaml"
  evaluation_data_dir: "./temp"
  output_data_dir: "./output"

append_mode: false
base_directory: "./"
target_date: "2025-01-01"

skip_face_processing: true

quality_thresholds_path: "./config/quality_thresholds.yaml"
evaluator_thresholds_path: "./config/evaluator_thresholds.yaml"
quality_profile: portrait

portrait_quality:
  insightface:
    strict: false
    model_root: "./models/insightface"
    providers:
      - "CPUExecutionProvider"
    det_size:
      - 640
      - 640

debug:
  log_summary_detail: false
  persist_run_results: false
  run_results_dir: "runs"

evaluation_rank:
  provisional_top_percent:
    enabled: true
    percent: 10