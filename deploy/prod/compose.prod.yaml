services:
  photo_insight:
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /work
    init: true

    # 本番はビルドしない（開発と完全分離）
    image: "photo_insight:${PHOTO_INSIGHT_IMAGE_TAG:-prod}"

    env_file:
      - ./config/.env

    environment:
      TZ: Asia/Tokyo
      PHOTO_INSIGHT_LOG_CONFIG: /work/config/logging_config.yaml
      MPLCONFIGDIR: /work/tmp/matplotlib

    volumes:
      # 入力写真 + XMP書き込み先
      - ${PHOTO_INSIGHT_INPUT_DIR:-/mnt/l/picture}:/work/input

      # 実行結果・ログ（すべて prod 配下）
      - ./runs:/work/runs
      - ./logs:/work/logs
      - ./tmp:/work/tmp
      - ./output:/work/output
      - ./models:/work/models

      # 設定（読み取り専用）
      - ./config:/work/config:ro

    command:
      [
        "python",
        "-m",
        "photo_insight.cli.run_batch",
        "--processor",
        "nef",
        "--config",
        "/work/config/config.yaml"
      ]

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"