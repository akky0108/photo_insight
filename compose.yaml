services:
  app-ci:
    build:
      context: .
      dockerfile: Dockerfile.test
      target: ci
    working_dir: /work
    volumes:
      - ./:/work:cached
      - pip-cache:/root/.cache/pip
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /work/src
    command: make ci-light
    tty: false

volumes:
  pip-cache: