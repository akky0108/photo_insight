name: CI (Docker)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export UID/GID
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Show workspace info
        run: |
          id
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          ls -ld "${GITHUB_WORKSPACE}"

      - name: Build app-ci
        env:
          UID: ${{ env.UID }}
          GID: ${{ env.GID }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.ci.yaml \
            build app-ci

      - name: Run ci-light
        env:
          UID: ${{ env.UID }}
          GID: ${{ env.GID }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.ci.yaml \
            run --rm app-ci make ci-light
