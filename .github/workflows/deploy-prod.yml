name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
      PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${PROD_HOST}" || { echo "[ERROR] PROD_HOST is empty"; exit 1; }
          test -n "${PROD_USER}" || { echo "[ERROR] PROD_USER is empty"; exit 1; }
          test -n "${PROD_APP_DIR}" || { echo "[ERROR] PROD_APP_DIR is empty"; exit 1; }
          test -n "${PROD_ENV_FILE}" || { echo "[ERROR] PROD_ENV_FILE is empty"; exit 1; }

      - name: Add production host to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -T 10 -p "${PROD_PORT:-22}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${PROD_PORT:-22}" \
            "${PROD_USER}@${PROD_HOST}" \
            'echo "[REMOTE] connected"; whoami; hostname; pwd'

      - name: Prepare remote temp directory
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${PROD_PORT:-22}" \
            "${PROD_USER}@${PROD_HOST}" \
            "set -euo pipefail; mkdir -p '${PROD_APP_DIR}/.deploy_tmp'; chmod 700 '${PROD_APP_DIR}/.deploy_tmp'"

      - name: Upload remote deploy script
        run: |
          set -euo pipefail
          scp \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -P "${PROD_PORT:-22}" \
            scripts/deploy/remote_deploy.sh \
            "${PROD_USER}@${PROD_HOST}:${PROD_APP_DIR}/.deploy_tmp/remote_deploy.sh"

      - name: Execute remote deploy
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_ACTOR_VALUE: ${{ github.actor }}
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${PROD_PORT:-22}" \
            "${PROD_USER}@${PROD_HOST}" \
            "set -euo pipefail; \
             chmod +x '${PROD_APP_DIR}/.deploy_tmp/remote_deploy.sh'; \
             PROD_APP_DIR='${PROD_APP_DIR}' \
             PROD_ENV_FILE='${PROD_ENV_FILE}' \
             GIT_SHA='${GIT_SHA}' \
             GIT_REF_NAME='${GIT_REF_NAME}' \
             GITHUB_RUN_ID='${GITHUB_RUN_ID_VALUE}' \
             GITHUB_ACTOR='${GITHUB_ACTOR_VALUE}' \
             bash '${PROD_APP_DIR}/.deploy_tmp/remote_deploy.sh'"

      - name: Cleanup remote temp files
        if: always()
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -p "${PROD_PORT:-22}" \
            "${PROD_USER}@${PROD_HOST}" \
            "set -euo pipefail; if [ -d '${PROD_APP_DIR}/.deploy_tmp' ]; then rm -f '${PROD_APP_DIR}/.deploy_tmp/remote_deploy.sh'; fi"